<li class="flex gap-4 items-start py-3 border-b border-gray-100 last:border-0">
  <div class="mt-0.5 w-2.5 h-2.5 rounded-full flex-shrink-0 mt-1.5 {{ status_badge[event.stage].split(' ') | first }} ring-2 ring-white"></div>
  <div class="flex-1 min-w-0">
    <div class="flex items-center gap-2">
      <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium {{ status_badge[event.stage] }}">
        {{ event.stage.value }}
      </span>
      <span class="text-xs px-2 py-0.5 rounded-full
        {% if event.outcome.value == 'Passed' %}bg-green-100 text-green-700
        {% elif event.outcome.value == 'Failed' %}bg-red-100 text-red-700
        {% elif event.outcome.value == 'Withdrew' %}bg-gray-100 text-gray-600
        {% else %}bg-yellow-50 text-yellow-700{% endif %}">
        {{ event.outcome.value }}
      </span>
      <span class="text-xs text-gray-400 ml-auto">{{ event.occurred_on.strftime('%b %d, %Y') }}</span>
    </div>
    {% if event.notes %}
      <p class="text-sm text-gray-600 mt-1">{{ event.notes }}</p>
    {% endif %}
  </div>
</li>
