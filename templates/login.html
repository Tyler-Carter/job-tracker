{% extends "base.html" %}
{% block title %}Admin Login — Job Tracker{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl shadow-sm p-8">

    <div class="mb-6 text-center">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-50 dark:bg-blue-950 rounded-full mb-3">
        <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="text-lg font-semibold text-gray-800 dark:text-gray-100">Admin Access</h1>
      <p class="text-sm text-gray-400 dark:text-gray-500 mt-1">Enter your password to manage applications.</p>
    </div>

    {% if error %}
      <div class="mb-4 px-3 py-2 bg-red-50 dark:bg-red-950 border border-red-200 dark:border-red-800 rounded text-sm text-red-600 dark:text-red-300">
        {{ error }}
      </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <input type="hidden" name="next" value="{{ next }}" />
      <div class="mb-4">
        <label for="password" class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Password</label>
        <input
          id="password"
          type="password"
          name="password"
          autofocus
          autocomplete="current-password"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <button type="submit"
        class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
        Log In
      </button>
    </form>

    <p class="text-center text-xs text-gray-300 dark:text-gray-600 mt-6">
      This is a personal job tracker. Public visitors can browse in read-only mode.
    </p>
  </div>
</div>
{% endblock %}
