<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-5 flex flex-col">
  <div class="mb-3">
    <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300">JD Analyzer</h3>
    <p class="text-xs text-gray-400 dark:text-gray-500 mt-0.5">
      Paste any job description to extract skills, red flags, and culture signals.
    </p>
  </div>

  {% if session.get('is_admin') %}
    <form
      hx-post="{{ url_for('analytics.jd_analyze') }}"
      hx-target="#jd-result"
      hx-swap="innerHTML"
      hx-indicator="#jd-spinner">
      <textarea
        name="jd_text"
        rows="7"
        placeholder="Paste job description here…"
        class="w-full border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-2 text-xs
               bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200
               placeholder-gray-300 dark:placeholder-gray-600
               focus:outline-none focus:ring-2 focus:ring-indigo-300 dark:focus:ring-indigo-700
               resize-y mb-3"
      ></textarea>
      <button
        type="submit"
        class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700
               text-white text-xs font-medium rounded-lg transition-colors">
        <svg id="jd-spinner"
          class="htmx-indicator animate-spin w-3.5 h-3.5 text-white"
          xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        Analyze JD
      </button>
    </form>
  {% else %}
    <p class="text-xs text-gray-400 dark:text-gray-500 italic">Admin login required to use JD Analyzer.</p>
  {% endif %}

  {# Result target — starts empty, replaced by HTMX swap #}
  <div id="jd-result" class="mt-4"></div>
</div>
